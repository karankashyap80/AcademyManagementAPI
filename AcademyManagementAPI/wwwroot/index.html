<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Management Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <header>
        <h2>🎓 Academy Management System</h2>

        <nav>
            <a href="#">Dashboard</a>
            <a href="#">Students</a>
            <a href="#">Courses</a>
            <a href="#">Logout</a>
        </nav>
    </header>

    <!-- Main Container -->
    <div class="container">

        <h1>Dashboard</h1>
        <p>Welcome to Academy Management System</p>

        <!-- Dashboard Cards -->
        <div class="cards">

            <div class="card">
                <h2>120</h2>
                <p>Total Students</p>
            </div>

            <div class="card">
                <h2>15</h2>
                <p>Teachers</p>
            </div>

            <div class="card">
                <h2>8</h2>
                <p>Courses</p>
            </div>

        </div>

        <!-- Student Form -->
        <div class="form-box">

            <h2>Add Student</h2>

            <input type="text" id="name" placeholder="Enter Name">

            <input type="email" id="email" placeholder="Enter Email">

            <input type="text" id="course" placeholder="Enter Course">

            <input type="number" id="age" placeholder="Enter Age">

            <input type="date" id="admissionDate">

            <input type="text" id="mobileNumber" placeholder="Enter Mobile Number">

            <input type="text" id="address" placeholder="Enter Address">

            <button onclick="addStudent()">Add Student</button>

        </div>

        <!-- Student Table -->
        <div class="table-box">

            <h2>Student List</h2>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Age</th>
                        <th>Admission Date</th>
                        <th>Mobile Number</th>
                        <th>Address</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="studentTableBody">
                </tbody>

            </table>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
